<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fergetracker — Tjøttabassenget</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden;background:#d4e8f0}
#app{display:flex;flex-direction:column;height:100vh}

/* header */
#hdr{background:#1c2b3a;color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand{display:flex;align-items:center;gap:9px}
.brand h1{font-size:14px;font-weight:600}
.brand p{font-size:10px;color:rgba(255,255,255,0.42);margin-top:1px}
#livebadge{font-size:10px;color:rgba(255,255,255,0.4);text-align:right;line-height:1.7}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;background:#fbbf24;vertical-align:middle}
.dot.ok{background:#4ade80;animation:pulse 2s ease-in-out infinite}
.dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* camera bar */
#cambar{display:flex;background:#141f2b;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;height:36px}
.ctab{flex:1;border:none;background:transparent;color:rgba(255,255,255,0.45);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.ctab:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.ctab.on{color:#6ab4e8;border-bottom-color:#6ab4e8;background:rgba(106,180,232,0.07)}
.ctab.x{flex:0 0 36px;font-size:15px;color:rgba(255,255,255,0.2)}
.ctab.x:hover{color:rgba(255,255,255,0.6)}

/* camera panel — tall, full image visible */
#campanel{flex-shrink:0;background:#0a1620;max-height:0;overflow:hidden;transition:max-height 0.35s ease}
#campanel.open{max-height:340px}
.cgrid{display:grid;height:338px}
.cbox{position:relative;overflow:hidden;background:#0a1420;display:flex;align-items:center;justify-content:center}
.cbox img{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 0.4s;display:block}
.cbox img.rdy{opacity:1}
.clbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.72));padding:28px 12px 8px;font-size:11px;color:rgba(255,255,255,0.9);font-weight:500}
.cbrow{position:absolute;top:7px;right:7px;display:flex;gap:5px}
.cbtn{background:rgba(0,0,0,0.6);border:none;color:rgba(255,255,255,0.7);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;display:inline-block;line-height:1.4}
.cbtn:hover{color:#fff;background:rgba(0,0,0,0.85)}
.cload{color:rgba(255,255,255,0.2);font-size:11px}

/* map fills rest */
#map{flex:1;min-height:0}

/* Leaflet — light nautical style matching NAIS */
.leaflet-tile-pane{filter:saturate(0.7) brightness(1.05)}
.leaflet-control-zoom a{background:#fff!important;color:#2a4a6a!important;border-color:#b8cfe0!important;font-weight:700!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:#e8f4ff!important}
.leaflet-control-attribution{background:rgba(255,255,255,0.8)!important;color:#6a8090!important;font-size:9px!important}
.leaflet-control-attribution a{color:#3a70a0!important}
.leaflet-tooltip{background:#fff;border:1px solid #a0c0d8;color:#1c3a5a;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.leaflet-popup-content-wrapper{background:#fff;border:1px solid #c0d8ec;color:#1c2b3a;border-radius:8px;box-shadow:0 3px 14px rgba(0,0,0,0.15);font-family:'Inter',sans-serif;font-size:12px;line-height:1.9}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-close-button{color:#4a7090!important;font-size:16px!important}
</style>
</head>
<body>
<div id="app">

  <div id="hdr">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="6" fill="#2a4a6a"/>
        <path d="M5 22 Q16 15 27 22" stroke="#6ab4e8" stroke-width="2" fill="none"/>
        <rect x="9" y="12" width="14" height="7" rx="2" fill="#6ab4e8" opacity="0.9"/>
        <rect x="13" y="8" width="5" height="5" rx="1" fill="#a8d4f0" opacity="0.8"/>
        <rect x="5" y="22" width="22" height="3" rx="1.5" fill="#6ab4e8" opacity="0.4"/>
      </svg>
      <div>
        <h1>Fergetracker — Tjøttabassenget</h1>
        <p>Sanntids AIS via BarentsWatch · Oppdateres hvert 30. sek</p>
      </div>
    </div>
    <div id="livebadge">
      <span><span class="dot" id="livdot"></span><span id="livetxt">Kobler til...</span></span><br>
      <span id="clock"></span>
    </div>
  </div>

  <div id="cambar">
    <button class="ctab" id="ctab-both"   onclick="camToggle('both')">📷 Begge kaier</button>
    <button class="ctab" id="ctab-tjotta" onclick="camToggle('tjotta')">📷 Tjøtta ferjekai</button>
    <button class="ctab" id="ctab-forvik" onclick="camToggle('forvik')">📷 Forvik ferjekai</button>
    <button class="ctab x"                onclick="camToggle('close')">✕</button>
  </div>

  <div id="campanel"><div class="cgrid" id="cgrid"></div></div>

  <div id="map"></div>

</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── VERIFIED kai coordinates (from NAIS, provided by user) ────────────────
var STOPS = [
  { name:'Tjøtta',      lat:65.82170045345921, lon:12.43072897642984 },
  { name:'Mindland',    lat:65.80720844049681, lon:12.49505388225882 },
  { name:'Tro',         lat:65.79689802389505, lon:12.52673388446233 },
  { name:'Stokkasjøen', lat:65.75429416842567, lon:12.55027804020758 },
  { name:'Vågsodden',   lat:65.72169894715547, lon:12.45117798367851 },
  { name:'Forvik',      lat:65.71276974628636, lon:12.45918768485670 }
];

// Map centre = midpoint of Tjøtta and Forvik
var MAP_LAT = (STOPS[0].lat + STOPS[5].lat) / 2; // 65.767
var MAP_LON = (STOPS[0].lon + STOPS[5].lon) / 2; // 12.445

// ── Ferries — 3 vessels operating Tjøttabassenget ─────────────────────────
// MF Sigrid:      MMSI 257243500  (confirmed from MarineTraffic screenshots)
// MF Tjøtta:      MMSI 257070900  (standard Torghatten ferry on this route)
// MF Stokkafjord: MMSI 257090500  (standard Torghatten ferry on this route)
// NOTE: if a ferry shows "ingen data" the MMSI may have changed — check NAIS
var FERRIES = [
  { name:'MF Sigrid',      mmsi:257243500, color:'#1a5fa8' },
  { name:'MF Tjøtta',      mmsi:257399400, color:'#c87800' },
  { name:'MF Stokkafjord', mmsi:258007770, color:'#2e7d32' }
];

// ── BarentsWatch credentials ──────────────────────────────────────────────
var BW_ID  = 'kentrobinhagen@gmail.com:ferja';
var BW_SEC = 'TjottaFerja2026!kbh';
var token = null, tokExp = 0;
var map, markers = {};
var vdata = {};

// ── Cameras ───────────────────────────────────────────────────────────────
var CAMS = {
  tjotta:{ label:'Tjøtta ferjekai', id:'3001071_1', page:'https://www.vegvesen.no/trafikk/vaerveikamera/3001071' },
  forvik:{ label:'Forvik ferjekai', id:'3001062_1', page:'https://www.vegvesen.no/trafikk/vaerveikamera/3001062' }
};
var camMode = 'close';

function camSrc(id){ return 'https://kamera.atlas.vegvesen.no/api/images/'+id+'?t='+Date.now(); }
function camToggle(mode){
  if(mode==='close'||mode===camMode){
    camMode='close'; document.getElementById('campanel').classList.remove('open');
    ['both','tjotta','forvik'].forEach(function(k){ var e=document.getElementById('ctab-'+k); if(e) e.classList.remove('on'); });
    return;
  }
  camMode=mode; document.getElementById('campanel').classList.add('open');
  ['both','tjotta','forvik'].forEach(function(k){ var e=document.getElementById('ctab-'+k); if(e) e.classList.toggle('on',k===mode); });
  buildCams();
}
function buildCams(){
  var keys=camMode==='both'?['tjotta','forvik']:[camMode];
  var gr=document.getElementById('cgrid');
  gr.style.gridTemplateColumns=keys.length===2?'1fr 1fr':'1fr';
  gr.innerHTML=keys.map(function(k){
    var c=CAMS[k];
    return '<div class="cbox"><div class="cload">Laster bilde...</div>'
      +'<img src="'+camSrc(c.id)+'" alt="'+c.label+'"'
      +' onload="this.classList.add(\'rdy\');this.previousElementSibling.style.display=\'none\'"'
      +' onerror="this.previousElementSibling.textContent=\'Kamera utilgjengelig\'">'
      +'<div class="clbl">'+c.label+'</div>'
      +'<div class="cbrow">'
      +'<button class="cbtn" onclick="refreshCam(\''+k+'\')">↺ Oppdater</button>'
      +'<a class="cbtn" href="'+c.page+'" target="_blank">↗ Åpne</a>'
      +'</div></div>';
  }).join('');
}
function refreshCam(k){
  var c=CAMS[k];
  document.querySelectorAll('.cbox img').forEach(function(img){
    if(img.alt===c.label){ img.classList.remove('rdy'); img.src=camSrc(c.id); }
  });
}
setInterval(function(){ if(camMode!=='close') buildCams(); }, 120000);

// ── Clock ─────────────────────────────────────────────────────────────────
function tick(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('no-NO'); }
tick(); setInterval(tick, 1000);

// ── Helpers ───────────────────────────────────────────────────────────────
function ago(ms){
  var s=Math.round((Date.now()-ms)/1000);
  if(s<5) return 'nå'; if(s<60) return s+'s'; if(s<3600) return Math.round(s/60)+'min'; return Math.round(s/3600)+'t';
}

// ── BarentsWatch token ────────────────────────────────────────────────────
async function getToken(){
  if(token && Date.now()<tokExp-30000) return token;
  var r = await fetch('https://id.barentswatch.no/connect/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'client_id='+encodeURIComponent(BW_ID)+'&client_secret='+encodeURIComponent(BW_SEC)+'&grant_type=client_credentials&scope=ais'
  });
  if(!r.ok){ var t=await r.text(); throw new Error('Token '+r.status+': '+t.slice(0,60)); }
  var d=await r.json();
  if(!d.access_token) throw new Error('Ingen access_token');
  token=d.access_token; tokExp=Date.now()+(d.expires_in||3600)*1000;
  return token;
}

// ── Fetch one vessel ──────────────────────────────────────────────────────
async function fetchOne(mmsi, tok){
  var r = await fetch('https://live.ais.barentswatch.no/v1/latest/combined',{
    method:'POST',
    headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},
    body:JSON.stringify({mmsi:mmsi})
  });
  if(!r.ok) throw new Error('AIS '+r.status);
  var text = await r.text();
  if(!text||!text.trim()) return null;
  try{
    var p=JSON.parse(text);
    if(Array.isArray(p)) return p[0]||null;
    if(p&&p.latitude!=null) return p;
    return null;
  }catch(e){
    var lines=text.trim().split('\n');
    for(var i=0;i<lines.length;i++){
      try{ var o=JSON.parse(lines[i]); if(o&&o.latitude!=null) return o; }catch(e2){}
    }
    return null;
  }
}

// ── Refresh all ferries ───────────────────────────────────────────────────
async function refresh(){
  try{
    var tok = await getToken();
    var found = 0;
    for(var i=0;i<FERRIES.length;i++){
      var f=FERRIES[i];
      try{
        var v = await fetchOne(f.mmsi, tok);
        if(v && v.latitude!=null){
          found++;
          var d={
            lat:+v.latitude, lon:+v.longitude,
            speed:+(v.speedOverGround||0),
            heading:+(v.courseOverGround||v.trueHeading||0),
            ts:v.msgtime?new Date(v.msgtime).getTime():Date.now(),
            name:v.name||f.name
          };
          vdata[f.mmsi]=d;
          updateMarker(f,d);
        }
      }catch(e){ console.warn(f.name,e.message); }
    }
    var dot=document.getElementById('livdot');
    var txt=document.getElementById('livetxt');
    if(found>0){
      dot.className='dot ok';
      txt.textContent='Live · '+found+' fartøy';
    } else {
      dot.className='dot err';
      txt.textContent='Ingen AIS-data';
    }
  }catch(e){
    document.getElementById('livdot').className='dot err';
    document.getElementById('livetxt').textContent='Feil: '+e.message.slice(0,30);
    console.error(e);
  }
}

// ── Vessel icon ───────────────────────────────────────────────────────────
function mkIcon(color, heading, name){
  var rot=+(heading||0);
  return L.divIcon({
    className:'',
    html:'<div style="position:relative;text-align:center">'
      +'<svg width="20" height="26" viewBox="0 0 20 26" style="transform:rotate('+rot+'deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,0.3))">'
      +'<polygon points="10,1 19,23 10,17 1,23" fill="'+color+'"/>'
      +'<polygon points="10,1 19,23 10,17 1,23" fill="none" stroke="white" stroke-width="1.2"/>'
      +'</svg>'
      +'<div style="white-space:nowrap;background:rgba(255,255,255,0.95);border:1.5px solid '+color+';'
      +'border-radius:4px;padding:1px 5px;font-size:10px;font-family:Inter,sans-serif;'
      +'font-weight:600;color:'+color+';box-shadow:0 1px 4px rgba(0,0,0,0.2);margin-top:2px;display:inline-block">'+name+'</div>'
      +'</div>',
    iconSize:[80,50], iconAnchor:[10,13]
  });
}

function updateMarker(f,d){
  if(!markers[f.mmsi]){
    markers[f.mmsi] = L.marker([d.lat,d.lon],{icon:mkIcon(f.color,d.heading,f.name),zIndexOffset:1000})
      .addTo(map)
      .bindPopup('');
  }
  markers[f.mmsi].setLatLng([d.lat,d.lon]);
  markers[f.mmsi].setIcon(mkIcon(f.color,d.heading,f.name));
  markers[f.mmsi].setPopupContent(
    '<div style="min-width:160px">'
    +'<div style="font-weight:600;font-size:13px;color:'+f.color+';margin-bottom:5px">'+f.name+'</div>'
    +'<div style="color:#2a3a4a;line-height:2">'
    +'Fart: <b>'+d.speed.toFixed(1)+' kn</b><br>'
    +'Kurs: <b>'+Math.round(d.heading)+'°</b><br>'
    +'Pos: <b>'+d.lat.toFixed(4)+'°N, '+d.lon.toFixed(4)+'°E</b><br>'
    +'AIS: <b>'+ago(d.ts)+'</b>'
    +'</div></div>'
  );
}

// ── Map init ──────────────────────────────────────────────────────────────
function initMap(){
  map = L.map('map',{
    center:[MAP_LAT, MAP_LON],
    zoom:11,
    zoomControl:true,
    minZoom:10,   // can't zoom out further than this
    maxZoom:14
  });

  // CartoDB Positron — clean light tiles, closest to NAIS style
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  // Kai markers — white circle with colored border
  STOPS.forEach(function(s){
    L.circleMarker([s.lat,s.lon],{
      radius:6, color:'#1a5fa8', fillColor:'#fff', fillOpacity:1, weight:2.5
    }).addTo(map).bindTooltip(s.name,{direction:'top',offset:[0,-4],permanent:false});
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────
function boot(){
  if(typeof L==='undefined'){ setTimeout(boot,100); return; }
  initMap();
  refresh();
  setInterval(refresh, 30000);
}
window.addEventListener('load', boot);
</script>
</body>
</html>
