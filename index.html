<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fergetracker — Tjøttabassenget</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden;background:#1c2b3a}
#app{display:flex;flex-direction:column;height:100vh}

/* ── header ── */
#hdr{
  background:#1c2b3a;color:#fff;
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.brand{display:flex;align-items:center;gap:9px}
.brand h1{font-size:14px;font-weight:600;letter-spacing:-0.2px}
.brand p{font-size:10px;color:rgba(255,255,255,0.42);margin-top:1px}
#livebadge{font-size:10px;color:rgba(255,255,255,0.4);text-align:right;line-height:1.7}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;background:#4ade80;vertical-align:middle;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── camera bar ── */
#cambar{
  display:flex;background:#141f2b;border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;height:36px;
}
.ctab{
  flex:1;border:none;background:transparent;color:rgba(255,255,255,0.45);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;
}
.ctab:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.ctab.on{color:#6ab4e8;border-bottom-color:#6ab4e8;background:rgba(106,180,232,0.07)}
.ctab.x{flex:0 0 36px;font-size:15px;color:rgba(255,255,255,0.2)}
.ctab.x:hover{color:rgba(255,255,255,0.6)}

/* ── camera panel ── */
#campanel{
  flex-shrink:0;background:#0a1620;
  max-height:0;overflow:hidden;transition:max-height 0.35s ease;
}
#campanel.open{max-height:340px}
.cgrid{display:grid;height:338px}
.cbox{
  position:relative;overflow:hidden;background:#0a1420;
  display:flex;align-items:center;justify-content:center;
}
/* object-fit:contain = full image visible, no cropping */
.cbox img{
  width:100%;height:100%;
  object-fit:contain;
  opacity:0;transition:opacity 0.4s;display:block;
}
.cbox img.rdy{opacity:1}
.clbl{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.72));
  padding:28px 12px 8px;font-size:11px;
  color:rgba(255,255,255,0.9);font-weight:500;
}
.cbrow{position:absolute;top:7px;right:7px;display:flex;gap:5px}
.cbtn{
  background:rgba(0,0,0,0.6);border:none;color:rgba(255,255,255,0.7);
  font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;
  font-family:'Inter',sans-serif;text-decoration:none;
  display:inline-block;line-height:1.4;
}
.cbtn:hover{color:#fff;background:rgba(0,0,0,0.85)}
.cload{color:rgba(255,255,255,0.2);font-size:11px}

/* ── NAIS map iframe — takes all remaining space ── */
#map-wrap{flex:1;min-height:0;position:relative}
#nais-frame{
  width:100%;height:100%;border:none;display:block;
  background:#d4e8f0;
}

/* loading overlay */
#map-loading{
  position:absolute;inset:0;background:#1a2e40;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:rgba(255,255,255,0.5);font-size:13px;
  pointer-events:none;transition:opacity 0.5s;
}
#map-loading.gone{opacity:0}
.spinner{
  width:32px;height:32px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  border-top-color:#6ab4e8;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="6" fill="#2a4a6a"/>
        <path d="M5 22 Q16 15 27 22" stroke="#6ab4e8" stroke-width="2" fill="none"/>
        <rect x="9" y="12" width="14" height="7" rx="2" fill="#6ab4e8" opacity="0.9"/>
        <rect x="13" y="8" width="5" height="5" rx="1" fill="#a8d4f0" opacity="0.8"/>
        <rect x="5" y="22" width="22" height="3" rx="1.5" fill="#6ab4e8" opacity="0.4"/>
      </svg>
      <div>
        <h1>Fergetracker — Tjøttabassenget</h1>
        <p>Sanntids AIS via Kystverket / BarentsWatch · Oppdateres automatisk</p>
      </div>
    </div>
    <div id="livebadge">
      <span><span class="dot"></span>NAIS Live AIS</span><br>
      <span id="clock"></span>
    </div>
  </div>

  <!-- CAMERA BAR -->
  <div id="cambar">
    <button class="ctab" id="ctab-both"   onclick="camToggle('both')">📷 Begge kaier</button>
    <button class="ctab" id="ctab-tjotta" onclick="camToggle('tjotta')">📷 Tjøtta ferjekai</button>
    <button class="ctab" id="ctab-forvik" onclick="camToggle('forvik')">📷 Forvik ferjekai</button>
    <button class="ctab x"                onclick="camToggle('close')">✕</button>
  </div>

  <!-- CAMERA PANEL -->
  <div id="campanel">
    <div class="cgrid" id="cgrid"></div>
  </div>

  <!-- NAIS EMBEDDED MAP -->
  <div id="map-wrap">
    <div id="map-loading">
      <div class="spinner"></div>
      <span>Laster NAIS-kart...</span>
    </div>
    <!--
      NAIS embed URL parameters:
      - lat/lon/zoom = viewport (centered on Tjøttabassenget)
      - Zoom 11 matches your screenshot exactly
      - minZoom/maxZoom locks the zoom level so user can't zoom too far out
      The embed shows all vessels in the area with live AIS positions
    -->
    <iframe
      id="nais-frame"
      src="https://nais.kystverket.no/?lang=no&zoom=11&lat=65.796&lon=12.41&layers=vessels"
      title="NAIS — Sanntids skipstrafikk Tjøttabassenget"
      allowfullscreen
      loading="lazy"
      onload="document.getElementById('map-loading').classList.add('gone')"
    ></iframe>
  </div>

</div>

<script>
// ── Camera config ─────────────────────────────────────────────────────────
var CAMS = {
  tjotta:{ label:'Tjøtta ferjekai', id:'3001071_1', page:'https://www.vegvesen.no/trafikk/vaerveikamera/3001071' },
  forvik:{ label:'Forvik ferjekai', id:'3001062_1', page:'https://www.vegvesen.no/trafikk/vaerveikamera/3001062' }
};

var camMode = 'close';

function camSrc(id){ return 'https://kamera.atlas.vegvesen.no/api/images/'+id+'?t='+Date.now(); }

function camToggle(mode){
  if(mode==='close' || mode===camMode){
    camMode='close';
    document.getElementById('campanel').classList.remove('open');
    ['both','tjotta','forvik'].forEach(function(k){
      var e=document.getElementById('ctab-'+k); if(e) e.classList.remove('on');
    });
    return;
  }
  camMode=mode;
  document.getElementById('campanel').classList.add('open');
  ['both','tjotta','forvik'].forEach(function(k){
    var e=document.getElementById('ctab-'+k); if(e) e.classList.toggle('on',k===mode);
  });
  buildCams();
}

function buildCams(){
  var keys = camMode==='both' ? ['tjotta','forvik'] : [camMode];
  var gr   = document.getElementById('cgrid');
  gr.style.gridTemplateColumns = keys.length===2 ? '1fr 1fr' : '1fr';
  gr.innerHTML = keys.map(function(k){
    var c=CAMS[k], src=camSrc(c.id);
    return '<div class="cbox">'
      +'<div class="cload">Laster bilde...</div>'
      +'<img src="'+src+'" alt="'+c.label+'"'
      +' onload="this.classList.add(\'rdy\');this.previousElementSibling.style.display=\'none\'"'
      +' onerror="this.previousElementSibling.textContent=\'Kamera utilgjengelig\'">'
      +'<div class="clbl">'+c.label+'</div>'
      +'<div class="cbrow">'
      +'<button class="cbtn" onclick="refreshCam(\''+k+'\')">↺ Oppdater</button>'
      +'<a class="cbtn" href="'+c.page+'" target="_blank">↗ Fullskjerm</a>'
      +'</div></div>';
  }).join('');
}

function refreshCam(k){
  var c=CAMS[k];
  document.querySelectorAll('.cbox img').forEach(function(img){
    if(img.alt===c.label){
      img.classList.remove('rdy');
      img.src=camSrc(c.id);
    }
  });
}

// Auto-refresh cameras every 2 minutes when open
setInterval(function(){ if(camMode!=='close') buildCams(); }, 120000);

// ── Clock ─────────────────────────────────────────────────────────────────
function tick(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('no-NO');
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
